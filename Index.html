<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- ===== Rev501 디버그 계측 (먹통 원인 추적용) =====
     standalone(홈 아이콘 전체화면)에서 어디까지 살아서 도달했는지를
     화면에 직접 찍는다. 콘솔을 볼 수 없는 환경이라, 화면에 보이는
     STEP 숫자가 멈춘 지점 = 죽은 위치. 문제 해결 후 이 블록은 제거. -->
<script>
(function(){
  // 화면 우상단에 항상 보이는 디버그 패널
  var box = document.createElement('div');
  box.id = '__dbg';
  box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:2147483647;'
    + 'background:rgba(0,0,0,0.85);color:#0f0;font:12px/1.4 monospace;'
    + 'padding:6px 8px;white-space:pre-wrap;word-break:break-all;'
    + 'max-height:45vh;overflow:auto;pointer-events:auto;';
  var t0 = Date.now();
  function ts(){ return ((Date.now()-t0)/1000).toFixed(2)+'s'; }
  function line(msg, color){
    var d = document.createElement('div');
    if(color) d.style.color = color;
    d.textContent = '['+ts()+'] '+msg;
    box.appendChild(d);
  }
  // body가 아직 없을 수 있으니 안전하게 붙인다
  function attach(){
    if(document.body){ document.body.appendChild(box); }
    else { (document.documentElement||document.head).appendChild(box); }
  }
  if(document.body){ attach(); }
  else { document.addEventListener('DOMContentLoaded', attach); attach(); }

  // 전역 API: 각 단계에서 window.DBG.step(n,'설명') 호출
  window.DBG = {
    step: function(n, desc){ line('STEP '+n+(desc?' — '+desc:''), '#0f0'); },
    note: function(msg){ line(msg, '#9cf'); },
    err:  function(msg){ line('ERROR ▶ '+msg, '#f55'); }
  };

  // 전역 에러 캐처 — 조용한 죽음 대신 화면에 빨갛게 표시
  window.onerror = function(message, source, lineno, colno, error){
    var s = (source||'').split('/').pop();
    window.DBG.err(message + '  @'+s+':'+lineno+':'+colno
      + (error && error.stack ? '\n'+error.stack : ''));
    return false; // 기본 동작도 유지
  };
  window.addEventListener('unhandledrejection', function(e){
    var r = e && e.reason;
    window.DBG.err('unhandledrejection: '
      + (r && r.message ? r.message : String(r))
      + (r && r.stack ? '\n'+r.stack : ''));
  });

  // 환경 정보 한 줄 (standalone 여부 / UA)
  var standalone = (window.navigator.standalone === true)
    || (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
  window.DBG.note('display-mode standalone? ' + standalone);
  window.DBG.note('UA: ' + navigator.userAgent);

  // STEP 0 — HTML 파싱 시작 (가장 먼저 실행되는 스크립트)
  window.DBG.step(0, 'HTML 파싱 시작 (head 최상단)');

  // 타임아웃 안전망 — N초 안에 STEP 6(인증 확정)에 도달 못하면 경고
  window.__reachedStep6 = false;
  setTimeout(function(){
    if(!window.__reachedStep6){
      window.DBG.err('TIMEOUT: 8초 안에 STEP 6(인증 확정)에 도달하지 못함. '
        + '위에 찍힌 마지막 STEP 번호가 멈춘 지점입니다.');
    }
  }, 8000);
})();
</script>

<style>
  :root {
    /* 종이(크레용) 테마 — 크림색 배경에 잉크빛 선/글자 */
    --bg: #e8dfc9;          /* 크림 종이색 (한 톤 진하게) */
    --surface: #ddd2b8;     /* 살짝 진한 크림 (입력칸·칩 배경) */
    --line: rgba(90,72,45,0.18);       /* 연필선 느낌의 갈색빛 옅은 선 */
    --line-strong: rgba(90,72,45,0.32);
    --text: #3a3327;        /* 먹색에 가까운 진한 갈색 */
    --text-2: #6e6453;
    --text-3: #a89c84;
    --dow-text: #574e3d;
    --sat: #3f6f9c;         /* 종이톤에 맞춰 살짝 가라앉은 파랑 */
    --sun: #b6493b;         /* 살짝 가라앉은 빨강(주홍) */
    --accent: #2f7d6e;      /* DinoPlan 로고 초록 — 포인트색 통일 */
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      /* 따뜻한 어둠 — 차가운 회색 대신 갈색이 도는 짙은 톤 */
      --bg: #25211b;
      --surface: #322d25;
      --line: rgba(232,214,180,0.20);
      --line-strong: rgba(232,214,180,0.34);
      --text: #ece5d6;
      --text-2: #c2b69d;
      --text-3: #877c69;
      --dow-text: #d8cdb6;
      --sat: #7ba9d6;
      --sun: #e8897c;
      --accent: #6cc0ad;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    overscroll-behavior: none;
  }
  body.sheet-open #app { overflow: hidden; }
  body.sheet-open .grid { pointer-events: none; }
  /* 시트(설정/검색/일정추가 등)가 열려 키보드가 올라올 때, 뒤 달력 전체가
     밀리거나 확대되지 않도록 html/body 자체를 고정한다 */
  html.sheet-open, body.sheet-open {
    position: fixed; left: 0; right: 0; top: 0; bottom: 0;
    width: 100%; height: 100%; overflow: hidden;
    overscroll-behavior: none; touch-action: none;
  }
  #app {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 18px 6px;
  }
  .head-actions { display: flex; align-items: center; gap: 2px; }
  .head-btn {
    background: transparent; border: none; color: var(--text-2); cursor: pointer;
    padding: 5px; line-height: 0; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .head-btn:active { background: var(--surface); }
  /* 개인일정 숨김(off) 상태: 토글 버튼을 흐리게 + 빗금 느낌으로 표시 */
  .head-btn#personalToggle { color: #1d9e75; }
  .head-btn#personalToggle.off { color: var(--text-3); position: relative; }
  .head-btn#personalToggle.off::after {
    content: ''; position: absolute; left: 3px; right: 3px; top: 50%;
    height: 2px; background: var(--text-3); transform: rotate(-45deg);
  }
  @media (prefers-color-scheme: dark) { .head-btn#personalToggle { color: #5fd3a8; } }
  /* 공휴일·휴일일정 토글: 켜짐=빨강, 꺼짐=흐림+빗금 (개인토글과 동일 방식) */
  .head-btn#holidayToggle { color: #b6493b; }
  .head-btn#holidayToggle.off { color: var(--text-3); position: relative; }
  .head-btn#holidayToggle.off::after {
    content: ''; position: absolute; left: 3px; right: 3px; top: 50%;
    height: 2px; background: var(--text-3); transform: rotate(-45deg);
  }
  @media (prefers-color-scheme: dark) { .head-btn#holidayToggle { color: #e8897c; } }
  .title-btn {
    display: flex; align-items: center; gap: 6px; background: transparent; border: none;
    color: var(--text); font-size: 21px; font-weight: 600; cursor: pointer;
    padding: 4px 2px; font-family: inherit;
  }
  .title-btn .caret { font-size: 13px; color: var(--text-2); }
  .title-btn:active { opacity: .7; }
  .nav { display: flex; gap: 6px; }
  .nav button, .today-btn {
    border: 0.5px solid var(--line-strong); background: transparent; color: var(--text);
    border-radius: 10px; width: 38px; height: 34px; font-size: 18px; line-height: 1;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .today-btn { width: auto; padding: 0 12px; font-size: 13px; white-space: nowrap; }
  .nav button:active, .today-btn:active { background: var(--surface); }

  .picker {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
    background: var(--bg); border-radius: 18px 18px 0 0;
    transform: translateY(100%); transition: transform .25s cubic-bezier(.2,.8,.2,1);
    padding: 8px 0 calc(18px + env(safe-area-inset-bottom));
  }
  .picker.open { transform: translateY(0); }
  .picker-cols { display: flex; height: 240px; }
  .picker-col { flex: 1; overflow-y: auto; text-align: center; }
  .picker-col .opt {
    padding: 13px 0; font-size: 18px; color: var(--text-3); cursor: pointer;
  }
  .picker-col .opt.sel { color: var(--text); font-weight: 700; font-size: 20px; }
  .picker-col .opt:active { background: var(--surface); }

  .dow {
    display: grid; grid-template-columns: repeat(5, 1fr) 0.8fr;
    padding: 56px 8px 4px;
    align-items: center;
    overflow: visible;
  }
  .dow span {
    text-align: center; font-size: 13px; color: var(--dow-text); font-weight: 600; padding: 2px 0;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .dow .we { position: relative; }
  .dow .we .wsat { color: var(--sat); }
  .dow .we .wsun { color: var(--sun); }
  .dow .we .wslash { color: var(--dow-text); font-weight: 700; padding: 0 3px; }
  .corner {
    position: absolute; right: 0; top: -56px; display: flex; flex-direction: column;
    gap: 0; width: 25vw; max-width: 180px;
    font-weight: 400; line-height: 1;
  }
  .corner-row {
    display: flex; align-items: center; gap: 4px; cursor: pointer;
    padding: 2px 2px 3px; border-bottom: 0.5px solid var(--line);
    min-height: 15px;
    width: 100%; min-width: 0; box-sizing: border-box;
  }
  .corner-row .cdate { flex: none; font-size: 13px; font-weight: 400 !important; }
  .corner-row.sat .cdate { color: var(--sat); opacity: 0.5; }
  .corner-row.sun .cdate { color: var(--sun); opacity: 0.5; }
  /* 코너 날짜가 공휴일이면 토/일 상관없이 빨강(흐림) */
  .corner-row .cdate.holiday { color: var(--sun) !important; opacity: 0.5; }
  /* 코너에 표시되는 공휴일 이름 */
  .corner-row .corner-hol {
    flex: 1 1 0; min-width: 0; font-size: clamp(7px, calc(var(--cellw, 60px) * 0.8 / 5.8), 15px);
    font-weight: 400; opacity: 0.5; color: var(--sun);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .corner-ev {
    display: block !important; flex: 1 1 0; min-width: 0;
    font-size: clamp(7px, calc(var(--cellw, 60px) * 0.8 / 5.8), 15px) !important; font-weight: 400 !important; opacity: 0.5;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .grid { flex: 1; display: flex; flex-direction: column; padding: 0 8px 8px; min-height: 0; }
  /* 달 넘김 슬라이드 — 새 달이 위/아래에서 살짝 밀려들어오며 페이드인.
     .slide-up = 다음 달(아래에서 올라옴), .slide-down = 이전 달(위에서 내려옴) */
  @keyframes monthSlideUp   { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes monthSlideDown { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
  .grid.slide-up   { animation: monthSlideUp   0.22s ease-out; }
  .grid.slide-down { animation: monthSlideDown 0.22s ease-out; }
  /* 일정 글자 굵기: 칸이 좁은 폰 세로에선 700(잘 보이게), 화면이 넓어지면(폰 가로·PC) 500으로 가늘게 */
  :root { --ev-weight: 700; }
  @media (min-width: 600px) { :root { --ev-weight: 500; } }
  .week { flex: 1; display: grid; grid-template-columns: repeat(5, 1fr) 0.8fr; gap: 1px; min-height: 0; position: relative; overflow: hidden; }
  .cell {
    border-top: 1px solid var(--line); border-left: 1px solid var(--line);
    padding: 3px 3px 0;
    overflow: hidden; cursor: pointer; min-width: 0; position: relative;
    display: flex; flex-direction: column;
  }
  .week .cell:first-child { border-left: none; }
  .week:last-child .cell { border-bottom: 1px solid var(--line); }
  .cell.other .dnum { color: var(--text-3); }
  /* 다른 달(미리보기) 공휴일 날짜: 빨강을 유지하되 흐릿하게 */
  .cell.other .dnum.holiday { color: var(--sun); opacity: 0.5; }
  .dnum { font-size: 13px; color: var(--text-2); line-height: 1.4; }
  .dnum.sat { color: var(--sat); }
  .dnum.sun { color: var(--sun); }
  .dnum.holiday { color: var(--sun); }
  .holiday-name {
    font-size: clamp(7px, calc(var(--cellw, 60px) * 0.8 / 6.2), 12px); font-weight: var(--ev-weight, 700); color: var(--sun);
    line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 1px; text-align: center; padding: 0 4px; box-sizing: border-box;
  }
  .cell.today { background: rgba(64,224,208,0.18); }
  .cell.today .dnum { font-weight: 400; color: #0d9488; }
  @media (prefers-color-scheme: dark) {
    .cell.today { background: rgba(80,230,215,0.14); }
    .cell.today .dnum { color: #5eead4; }
    .we-half.we-today .wd { background: #14b8a6; }
  }
  .we-nums { font-size: 10px; }
  .we-nums .s1 { color: var(--sat); }
  .we-nums .s2 { color: var(--sun); }
  .we-nums .cm { color: var(--text-3); }
  .cell.other .we-nums .s1, .cell.other .we-nums .s2 { color: var(--text-3); }

  /* split weekend cell: Saturday top, Sunday bottom */
  .cell.weekend { padding: 0; }
  .we-half {
    flex: 1; min-height: 0; padding: 3px 2px; position: relative;
    display: flex; flex-direction: column; cursor: pointer; overflow: hidden;
  }
  .we-half.top { border-bottom: 1px solid var(--line); background: rgba(63,111,156,0.045); }
  .we-half.bot { background: rgba(182,73,59,0.05); }
  .we-half .wd { font-size: 13px; line-height: 1.3; }
  .we-half.top .wd { color: var(--sat); }
  .we-half.bot .wd { color: var(--sun); }
  .cell.weekend.other .we-half.top .wd { color: var(--sat); opacity: 0.45; }
  .cell.weekend.other .we-half.bot .wd { color: var(--sun); opacity: 0.45; }
  .we-half .wd.wd-holiday { color: var(--sun) !important; }
  /* 오늘이 주말일 때: 업무 음영이 올 일 없으므로 동그라미로 표시(볼드 없음) */
  .we-half.we-today .wd {
    background: #14b8a6; color: #fff; border-radius: 50%; font-weight: 400;
    width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; align-self: flex-start;
  }
  .we-half .wevs { display: flex; flex-direction: column; align-items: center; gap: 1px; margin-top: 1px; overflow: hidden; }
  .we-ev {
    font-size: clamp(7px, calc(var(--cellw, 60px) * 0.8 / 6.2), 12px); line-height: 1.3; font-weight: var(--ev-weight, 700);
    color: #e23b3b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; max-width: 100%;
  }
  @media (prefers-color-scheme: dark) { .we-ev { color: #ff7676; } }
  .we-more { font-size: 9px; color: var(--text-3); }

  .events { margin-top: 2px; display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
  .ev {
    font-size: 10px; line-height: 1.3; border-radius: 3px; padding: 1px 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ev.c0 { background: rgba(37,99,168,0.16); color: var(--sat); }
  .ev.c1 { background: rgba(186,117,23,0.18); color: #9a5f12; }
  .ev.c2 { background: rgba(29,158,117,0.18); color: #0f6e56; }
  .ev.c3 { background: rgba(212,83,126,0.16); color: #993556; }
  @media (prefers-color-scheme: dark) {
    .ev.c1 { color: #f0b766; }
    .ev.c2 { color: #6fd0ac; }
    .ev.c3 { color: #ee9; }
  }
  .ev.span-mid, .ev.span-start { border-top-right-radius: 0; border-bottom-right-radius: 0; }
  .ev.span-mid, .ev.span-end { border-top-left-radius: 0; border-bottom-left-radius: 0; margin-left: -3px; }
  .ev.span-mid { margin-right: -3px; }
  .ev.span-start { margin-right: -3px; }
  .more { font-size: 9px; color: var(--text-3); padding-left: 4px; }

  /* multi-day / single bars laid over the week */
  .barlayer { position: absolute; left: 0; right: 0; top: 20px; bottom: 2px; pointer-events: none; }
  .bar {
    position: absolute; height: 16px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto; cursor: pointer; overflow: hidden;
    padding: 0 5px;
  }
  .bar .lbl {
    font-size: clamp(7px, calc(var(--cellw, 60px) / 7.8), 13px); line-height: 1; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; flex: 0 1 auto; min-width: 0;
    font-weight: var(--ev-weight, 700); padding: 0;
  }
  .bar.holiday-bar .lbl { color: var(--sun); }
  /* 직전/다음 달 공휴일 이름은 흐릿하게 (날짜 숫자와 통일) */
  .bar.holiday-bar.other { opacity: 0.5; }
  /* 주말칸의 직전/다음 달 공휴일 이름도 흐릿하게 */
  .holiday-name.other-hol { opacity: 0.5; }
  /* 직전/다음 달 일반 일정도 흐릿하게 (막대 .bar, 주말칸 .wevs 공통) */
  .bar.other-ev, .wevs.other-ev { opacity: 0.5; }
  /* line that fills the space between the label and the arrowhead */
  .bar .line { flex: 1 1 2px; height: 0; border-top: 1.5px solid currentColor; min-width: 0; }
  /* arrowhead drawn as a CSS triangle, sitting flush on the line */
  .bar .head { flex: 0 0 auto; width: 0; height: 0; }
  .bar .head.l {
    border-top: 3.5px solid transparent; border-bottom: 3.5px solid transparent;
    border-right: 5px solid currentColor;
  }
  .bar .head.r {
    border-top: 3.5px solid transparent; border-bottom: 3.5px solid transparent;
    border-left: 5px solid currentColor;
  }
  .bar.c0 { background: rgba(37,99,168,0.18); }
  .bar.c1 { background: rgba(186,117,23,0.20); }
  .bar.c2 { background: rgba(29,158,117,0.20); }
  .bar.c3 { background: rgba(212,83,126,0.18); }
  .bar { color: #1a1a1a; }
  @media (prefers-color-scheme: dark) {
    .bar { color: #f2f2f2; }
  }
  .bar.cont-l { border-top-left-radius: 0; border-bottom-left-radius: 0; }
  .bar.cont-r { border-top-right-radius: 0; border-bottom-right-radius: 0; }

  /* sheet */
  .scrim {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 10;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
    background: var(--bg); border-radius: 18px 18px 0 0;
    transform: translateY(100%); transition: transform .25s cubic-bezier(.2,.8,.2,1);
    padding: 4px 18px calc(14px + env(safe-area-inset-bottom));
    /* 시트가 화면을 꽉 덮지 않도록 위쪽 공간을 항상 남긴다.
       (요일줄 + 1주차 첫 줄이 보여서, 그 부분을 탭해 달력으로 바로 나갈 수 있음)
       내용이 이보다 길면 시트 안에서 스크롤된다. */
    max-height: 72dvh; overflow-y: auto;
    overscroll-behavior: contain; /* 시트 스크롤이 끝에 닿아도 뒤 달력으로 전달되지 않게 */
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y; /* 시트 안에서는 세로 스크롤만, 가로/뒤로 전달 방지 */
    /* 키보드가 올라오면 시트 자체를 점프시키지 않고, 아래쪽에 키보드 높이만큼
       여백(padding)만 확보한다. 시트는 바닥에 고정돼 있어 들썩이지 않는다 */
    padding-bottom: calc(14px + env(safe-area-inset-bottom) + var(--kb, 0px));
  }
  .sheet.open { transform: translateY(0); }
  .grab { width: 38px; height: 4px; background: var(--line-strong); border-radius: 99px; margin: 4px auto 8px; }
  .sheet h2 { font-size: 17px; font-weight: 600; margin: 0 0 10px; }
  .edit-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .edit-head h2 { margin: 0 0 10px; }
  .back-btn {
    display: none; align-items: center; gap: 3px; margin: 0 0 10px;
    background: var(--surface); border: 0.5px solid var(--line-strong); color: var(--text);
    border-radius: 10px; padding: 6px 11px 6px 8px; font-size: 13px; font-weight: 700;
    font-family: inherit; cursor: pointer; line-height: 1;
  }
  .back-btn svg { display: block; }
  .back-btn:active { opacity: .7; }
  .edit-head.from-search .back-btn { display: flex; }
  .day-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .day-ev {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--surface); border-radius: 10px; cursor: pointer;
  }
  .day-ev .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .dot.c0 { background: var(--sat); } .dot.c1 { background: #ba7517; }
  .dot.c2 { background: #1d9e75; } .dot.c3 { background: #d4537e; }
  .day-ev .info { flex: 1; min-width: 0; }
  .day-ev .t { font-size: 14px; }
  .day-ev .sub { font-size: 11px; color: var(--text-2); margin-top: 1px; }
  .day-ev .sub.memo {
    white-space: pre-wrap; word-break: break-word;
  }
  .empty { font-size: 13px; color: var(--text-3); text-align: center; padding: 16px 0; }

  /* search result list */
  .search-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .sr-item {
    padding: 12px 14px; background: var(--surface); border-radius: 10px; cursor: pointer;
  }
  .sr-item:active { opacity: .8; }
  .sr-line { font-size: 13px; line-height: 1.5; }
  .sr-line .k { color: var(--text-3); font-weight: 700; }
  .sr-date { color: var(--text-2); }
  .sr-title { color: var(--text); font-weight: 700; font-size: 15px; margin: 2px 0; }
  .sr-memo { color: var(--text-2); white-space: pre-wrap; word-break: break-word; }
  .sr-hl { background: rgba(255,213,0,0.45); border-radius: 2px; padding: 0 1px; }
  @media (prefers-color-scheme: dark) { .sr-hl { background: rgba(255,213,0,0.30); color: #fff; } }

  label { display: block; font-size: 12px; color: var(--text); font-weight: 700; margin: 9px 0 4px; }
  input[type=text], input[type=date], textarea {
    width: 100%; border: 0.5px solid var(--line-strong); background: var(--bg); color: var(--text);
    border-radius: 10px; padding: 9px 12px; font-size: 15px; font-family: inherit;
  }
  textarea { resize: vertical; min-height: 120px; }
  .input-mic { position: relative; }
  .input-mic input, .input-mic textarea { padding-right: 44px; }
  .mic-btn {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 32px; height: 32px; border: none; background: var(--surface);
    border-radius: 50%; cursor: pointer; line-height: 0; color: var(--text-2);
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .mic-btn.area { top: 8px; transform: none; }
  .mic-btn:active { background: var(--line-strong); }
  .mic-btn.listening { background: #e23b3b; color: #fff; animation: micpulse 1s ease-in-out infinite; }
  @keyframes micpulse { 0%,100%{ opacity:1; } 50%{ opacity:0.5; } }

  /* 검색 버튼(돋보기)은 항상 표시 */
  .search-wrap input { padding-right: 44px; }

  /* 백업 버튼 가로 2칸 배치 */
  .backup-row { display: flex; gap: 10px; margin-top: 6px; }
  .backup-row .btn { flex: 1; }
  .types { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .type-chip {
    border: 1px solid var(--line-strong); background: var(--bg); color: var(--text);
    border-radius: 18px; padding: 7px 14px; font-size: 13px; font-family: inherit;
    font-weight: 700; cursor: pointer;
  }
  .type-chip[data-t=work].sel { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }
  .type-chip[data-t=important].sel { background:#2563a8; color:#fff; border-color:#2563a8; }
  .type-chip[data-t=holiday].sel { background:#b6493b; color:#fff; border-color:#b6493b; }
  .type-chip[data-t=personal].sel { background:#1d9e75; color:#fff; border-color:#1d9e75; }
  .type-chip.chip-disabled { opacity: 0.35; pointer-events: none; }
  #weekendHint { display: none; }
  #weekendHint.show { display: block; }
  .colors { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 6px; }
  .colors .sw {
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent;
  }
  .colors .sw.sel { border-color: var(--text); }
  .colors.disabled { opacity: 0.35; pointer-events: none; }

<!-- ===== Firebase (인증 + 클라우드 동기화) =====
     설계 개요 — 책임을 세 층으로 나눈다.
       1) Firebase 초기화 : 앱/DB/Auth 인스턴스를 한 번만 만든다.
       2) 인증 층 (Auth)  : "지금 누가 로그인했나"만 다룬다. 로그인 상태가
                            바뀌면 본문에 알린다(window.onAuthChange).
       3) 데이터 층 (Cloud): "그 사람의 일정 칸"을 읽고 쓴다. 어느 칸인지는
                            로그인한 사용자(uid)로 정해진다.

     데이터 모델 (개인 캘린더, 향후 팀/패밀리 확장 대비)
       calendars/{uid}        ← 사용자별 개인 일정 문서 (이번 3.0의 핵심)
       calendars/shared       ← 2.x 시절 공용 칸 (로그인 후 1회 '이사'에만 사용)

     본문(앱 로직)이 알아야 할 것은 아래 4개뿐 — 내부 구현은 신경 쓸 필요 없다.
       window.onAuthChange(user|null)  : 로그인 상태 변화 콜백 (본문이 구현)
       window.authSignIn()             : 구글 로그인 시작
       window.authSignOut()            : 로그아웃
       window.cloudSave(events)        : 현재 사용자 칸에 저장
       window.cloudListen()            : 현재 사용자 칸 실시간 수신 시작
       window.onCloudData(events)      : 수신 콜백 (본문이 구현)
-->
<script>if(window.DBG) window.DBG.step(1, 'module 태그 도달 (파서가 Firebase 블록까지 옴)');</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc, onSnapshot
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  /* ---- 1) Firebase 초기화 (schedit 프로젝트) ---- */
  const firebaseConfig = {
    apiKey: "AIzaSyBJg8UBUmw75m2_w5IGFUoEBSkY7II4xQ0",
    authDomain: "schedit-1999e.firebaseapp.com",
    projectId: "schedit-1999e",
    storageBucket: "schedit-1999e.firebasestorage.app",
    messagingSenderId: "650966539543",
    appId: "1:650966539543:web:726d071d4dd259bd5f6b52"
  };
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  if(window.DBG) window.DBG.step(2, 'Firebase import + initializeApp 완료');

  /* ---- 2) 인증 층 ----
     현재 로그인한 사용자를 한 곳(currentUser)에서만 관리한다.
     상태가 바뀔 때마다 본문에 통보하여, 본문이 로그인 화면/캘린더를
     전환하고 동기화를 시작/중단하도록 한다. */
  let currentUser = null;

  const provider = new GoogleAuthProvider();

  window.authSignIn = async function() {
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      console.warn('로그인 실패:', e);
      if (typeof window.onAuthError === 'function') window.onAuthError(e);
    }
  };

  window.authSignOut = async function() {
    try { await signOut(auth); }
    catch (e) { console.warn('로그아웃 실패:', e); }
  };

  // 로그인/로그아웃이 감지되면 currentUser를 갱신하고 본문에 알린다.
  onAuthStateChanged(auth, (user) => {
    currentUser = user || null;
    if (typeof window.onAuthChange === 'function') {
      window.onAuthChange(currentUser);
    }
  });

  /* ---- 3) 데이터 층 ----
     "현재 사용자의 일정 문서"를 그때그때 만들어 쓴다. 고정 참조(shared)를
     없애고 uid 기준으로 바꾼 것이 3.0의 핵심. 팀/패밀리에서 남의 문서를
     볼 때도 userDocRef(다른uid) 형태로 재사용할 수 있다. */
  function userDocRef(uid) {
    return doc(db, 'calendars', uid);
  }

  // 방금 내가 올린 내용인지 기억 (메아리 방지)
  let _lastPushedJson = null;
  // 현재 켜져 있는 실시간 구독을 해제하는 함수 (계정 전환 시 정리용)
  let _unsubscribe = null;

  // 현재 사용자 칸에 일정 전체를 통째로 저장 (save에서 호출)
  window.cloudSave = async function(events) {
    if (!currentUser) return;            // 로그인 전에는 클라우드에 쓰지 않음
    try {
      _lastPushedJson = JSON.stringify(events);
      await setDoc(userDocRef(currentUser.uid), { events, at: Date.now() });
    } catch (e) {
      console.warn('cloudSave 실패:', e);
    }
  };

  // 현재 사용자 칸의 변화를 실시간으로 받아 화면에 반영
  window.cloudListen = function() {
    if (!currentUser) return;
    if (_unsubscribe) { _unsubscribe(); _unsubscribe = null; }  // 이전 구독 정리

    _unsubscribe = onSnapshot(userDocRef(currentUser.uid), (snap) => {
      if (!snap.exists()) return;
      const data = snap.data();
      const incoming = Array.isArray(data.events) ? data.events : [];
      // 방금 내가 올린 것이 메아리쳐 돌아온 경우는 무시 (화면 깜빡임 방지)
      if (JSON.stringify(incoming) === _lastPushedJson) return;
      if (typeof window.onCloudData === 'function') {
        window.onCloudData(incoming);
      }
    }, (err) => {
      console.warn('cloudListen 오류:', err);
    });
  };

  // 실시간 수신 중단 (로그아웃 시 본문에서 호출)
  window.cloudStop = function() {
    if (_unsubscribe) { _unsubscribe(); _unsubscribe = null; }
  };

  /* ---- 데이터 '이사' (2.x → 3.0 1회 전환) ----
     로그인 후, 내 개인 칸이 비어 있고 옛 shared 칸에 일정이 남아 있으면
     그 일정을 내 칸으로 한 번만 복사한다. 이미 내 칸에 데이터가 있으면
     아무것도 하지 않는다. 복사된 일정 배열을 반환(없으면 null). */
  window.cloudMigrateFromShared = async function() {
    if (!currentUser) return null;
    try {
      const mineSnap = await getDoc(userDocRef(currentUser.uid));
      const mineHasData =
        mineSnap.exists() &&
        Array.isArray(mineSnap.data().events) &&
        mineSnap.data().events.length > 0;
      if (mineHasData) return null;      // 이미 내 일정이 있으면 이사 불필요

      const sharedSnap = await getDoc(doc(db, 'calendars', 'shared'));
      const sharedEvents =
        sharedSnap.exists() && Array.isArray(sharedSnap.data().events)
          ? sharedSnap.data().events : [];
      if (sharedEvents.length === 0) return null;   // 옮길 것이 없음

      // 내 칸으로 복사 (shared 원본은 보존 — 안전하게 남겨둔다)
      _lastPushedJson = JSON.stringify(sharedEvents);
      await setDoc(userDocRef(currentUser.uid), { events: sharedEvents, at: Date.now() });
      return sharedEvents;
    } catch (e) {
      console.warn('이사 실패:', e);
      return null;
    }
  };

  // 본문이 "연결 준비됨"을 기다릴 수 있게 신호
  window.cloudReady = true;
  if(window.DBG) window.DBG.step(3, 'Firebase 모듈 끝 (cloudReady=true)');
  document.dispatchEvent(new Event('cloud-ready'));
</script>
<!-- ===== /Firebase ===== -->

</head>

<script>
if(window.DBG) window.DBG.step(4, '본문 인라인 스크립트 진입');
const STORE = 'workcal.events.v1';
const MS = 86400000;
let events = load();
let view = new Date(); view.setDate(1);
let selectedType = 'work';
let selectedBg = 0;
let editingId = null;
let lastSelectedDate = null;
let lastSearchQuery = '';   // 마지막 검색어 (뒤로가기로 목록 복원용)
let cameFromSearch = false; // 수정 화면이 검색을 거쳐 열렸는지
let _navActive = false;     // 검색 목록이 history에 한 단계 쌓여 있는지
let showPersonal = (localStorage.getItem('workcal.showPersonal') !== 'off'); // 개인일정 달력 표시 여부(기본 표시)
let showHoliday = (localStorage.getItem('workcal.showHoliday') !== 'off');   // 공휴일+휴일일정 표시 여부(기본 표시)
// 달력에 이 일정을 표시할지 — 개인일정/휴일일정 토글을 함께 반영
function isVisibleType(e) {
  if (!showPersonal && e.type === 'personal') return false;
  if (!showHoliday && e.type === 'holiday') return false;
  return true;
}

const $ = id => document.getElementById(id);

// simple toast popup (reused for backup + voice messages)
let _toastEl = null, _toastTimer = null;
function showToast(text) {
  if (!_toastEl) {
    _toastEl = document.createElement('div');
    _toastEl.style.cssText = 'position:fixed;left:50%;bottom:32px;transform:translateX(-50%);background:#333;color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:60;max-width:84%;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,0.25);';
    document.body.appendChild(_toastEl);
  }
  _toastEl.textContent = text;
  _toastEl.style.display = 'block';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { if (_toastEl) _toastEl.style.display = 'none'; }, 2500);
}
const pad = n => String(n).padStart(2,'0');
const iso = d => d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
const parse = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };

function load() {
  try { return JSON.parse(localStorage.getItem(STORE)) || []; }
  catch(e) { return []; }
}
function save() {
  const json = JSON.stringify(events);
  localStorage.setItem(STORE, json);
  // auto backup: overwrite a single latest snapshot (on-device)
  try {
    localStorage.setItem(STORE + '.backup', JSON.stringify({ at: Date.now(), events }));
  } catch(e) {}
  // 클라우드에도 올리기 — 폰 저장은 그대로 두고 추가만
  if (window.cloudReady && typeof window.cloudSave === 'function') {
    window.cloudSave(events);
  }
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

const KMONTH = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const KDOW = ['일','월','화','수','목','금','토'];

// 2026 대한민국 공휴일 (정부 월력요항 기준). key: 'M-D'
const HOLIDAYS = {
  '1-1': '신정',
  '2-16': '설날연휴', '2-17': '설날', '2-18': '설날연휴',
  '3-1': '삼일절', '3-2': '대체공휴일',
  '5-5': '어린이날',
  '5-24': '부처님오신날', '5-25': '대체공휴일',
  '6-3': '지방선거', '6-6': '현충일',
  '8-15': '광복절', '8-17': '대체공휴일',
  '9-24': '추석연휴', '9-25': '추석', '9-26': '추석연휴',
  '10-3': '개천절', '10-5': '대체공휴일', '10-9': '한글날',
  '12-25': '성탄절'
};
function holidayName(d) {
  return HOLIDAYS[(d.getMonth()+1) + '-' + d.getDate()] || null;
}
// 화면 표시용: 공휴일 토글이 꺼져 있으면 공휴일 이름을 숨긴다(데이터엔 영향 없음)
function holidayShown(d) {
  return showHoliday ? holidayName(d) : null;
}

// pastel background palette (10) + event type text colors
const PALETTE = ['#ff8fa3','#ffb56b','#ffe66d','#8fe388','#5ad2f4','#6c9bff','#b388ff','#ff7ec7','#c0c0c8'];
const TYPE_COLORS = { work:'#1a1a1a', important:'#2563a8', holiday:'#b6493b', personal:'#1d9e75' };
const TYPE_COLORS_DARK = { work:'#f2f2f2', important:'#7fb3ed', holiday:'#e8897c', personal:'#5fd3a8' };
function isDark(){ return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; }
function evTextColor(e){
  const t = e.type || 'work';
  return (isDark()?TYPE_COLORS_DARK:TYPE_COLORS)[t] || (isDark()?'#f2f2f2':'#1a1a1a');
}
// fixed background tints for non-work types (same hue family as the text color)
const TYPE_BG = { important:'#cfe3ff', holiday:'#ffd6d6', personal:'#d4f5cb' };
const TYPE_BG_DARK = { important:'#23344a', holiday:'#4a2626', personal:'#234a3a' };
function evBgColor(e){
  const t = e.type || 'work';
  if (t !== 'work') return 'transparent';
  let i = (typeof e.bg === 'number') ? e.bg : 0;
  return PALETTE[i] || PALETTE[0];
}


function render() {
  $('ymLabel').textContent = view.getFullYear() + '년 ' + (view.getMonth()+1) + '월';

  const grid = $('grid');
  grid.innerHTML = '';

  // Measure a weekday cell's width and expose it as --cellw so font sizes can
  // scale to the cell (works on portrait, landscape, tablet) instead of vw.
  const gw = grid.clientWidth || (window.innerWidth - 16);
  const weekdayCellW = (gw - 5) * (5 / 5.8) / 5; // 5 gaps approx, 5 weekday cols of 5.8 units
  document.documentElement.style.setProperty('--cellw', weekdayCellW + 'px');

  const first = new Date(view.getFullYear(), view.getMonth(), 1);
  const dow1 = first.getDay(); // 0=Sun .. 6=Sat

  // Grid start (compute FIRST): if the 1st is Sat/Sun, begin the body on the
  // following Monday so the month fits in 5 rows; otherwise start from the
  // Monday on/before the 1st.
  let gridStartMonday;
  if (dow1 === 6) {
    gridStartMonday = new Date(first); gridStartMonday.setDate(3);
  } else if (dow1 === 0) {
    gridStartMonday = new Date(first); gridStartMonday.setDate(2);
  } else {
    const offset = (dow1 + 6) % 7; // Mon=0
    gridStartMonday = new Date(first);
    gridStartMonday.setDate(first.getDate() - offset);
  }

  // Corner: the weekend (Sat & Sun) that sits immediately BEFORE the grid's
  // first Monday. This is the paper-diary corner (e.g. for a month starting
  // Sunday, corner = the previous day Sat + that Sun).
  const corner = $('cornerDates');
  corner.innerHTML = '';
  const cornerSun = new Date(gridStartMonday); cornerSun.setDate(gridStartMonday.getDate() - 1);
  const cornerSat = new Date(gridStartMonday); cornerSat.setDate(gridStartMonday.getDate() - 2);
  const fmtMD = d => (d.getMonth()+1) + '/' + d.getDate();

  [[cornerSat,'sat'],[cornerSun,'sun']].forEach(([d, cls]) => {
    const row = document.createElement('div');
    row.className = 'corner-row ' + cls;
    const dlabel = document.createElement('span');
    dlabel.className = 'cdate';
    dlabel.textContent = fmtMD(d);
    const cornerHolColor = holidayName(d);   // 코너 날짜 색은 항상 공휴일 빨강
    const cornerHol = holidayShown(d);        // 코너 공휴일 이름은 토글 반영
    if (cornerHolColor) dlabel.classList.add('holiday');   // 공휴일이면 날짜를 빨강(흐림)
    row.appendChild(dlabel);

    const di = iso(d);
    const dayEvents = events.filter(e => e.start === di && e.end === di
      && isVisibleType(e));

    if (cornerHol) {
      // 공휴일이면 공휴일 이름을 우선 표시 (예: 추석연휴)
      const h = document.createElement('span');
      h.className = 'corner-hol';
      h.textContent = cornerHol;
      row.appendChild(h);
    } else if (dayEvents.length) {
      const t = document.createElement('span');
      t.className = 'corner-ev';
      // 제목은 6글자까지만 보이고 넘으면 …을 붙여 총 7칸으로 고정
      const rawTitle = dayEvents[0].title || '';
      const shownTitle = rawTitle.length > 6 ? rawTitle.slice(0, 6) + '…' : rawTitle;
      t.textContent = shownTitle + (dayEvents.length > 1 ? ' +' + (dayEvents.length-1) : '');
      t.style.color = evTextColor(dayEvents[0]);
      row.appendChild(t);
    }
    row.addEventListener('click', (ev) => { ev.stopPropagation(); openDay(new Date(d)); });
    corner.appendChild(row);
  });

  let start = gridStartMonday;

  // Always render exactly 5 rows.
  const numWeeks = 5;

  const todayIso = iso(new Date());

  for (let w = 0; w < numWeeks; w++) {
    const weekStart = new Date(start); weekStart.setDate(start.getDate() + w*7);
    const week = document.createElement('div');
    week.className = 'week';

    const weekDates = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
      weekDates.push(d);
    }

    // 5 weekday cells
    for (let i = 0; i < 5; i++) {
      const d = weekDates[i];
      week.appendChild(makeCell(d, false, todayIso));
    }
    // 1 weekend cell (Sat + Sun)
    week.appendChild(makeWeekendCell(weekDates[5], weekDates[6], todayIso));

    // event bars for weekdays
    layoutEvents(week, weekDates, todayIso);

    grid.appendChild(week);
  }
}

function makeCell(d, isWeekend, todayIso) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  if (d.getMonth() !== view.getMonth()) cell.classList.add('other');
  if (iso(d) === todayIso) cell.classList.add('today');
  const num = document.createElement('div');
  num.className = 'dnum';
  num.textContent = (d.getMonth() !== view.getMonth())
    ? (d.getMonth()+1) + '/' + d.getDate()
    : d.getDate();
  const hol = holidayName(d);   // 날짜 숫자 색은 토글과 무관하게 항상 공휴일 빨강
  if (hol) {
    num.classList.add('holiday'); // 공휴일 날짜는 빨강. 다른 달이면 .other의 opacity로 흐릿하게.
  }
  cell.appendChild(num);
  const evWrap = document.createElement('div');
  evWrap.className = 'events';
  cell.appendChild(evWrap);
  cell.addEventListener('click', () => openDay(d));
  return cell;
}

function makeWeekendCell(sat, sun, todayIso) {
  const cell = document.createElement('div');
  cell.className = 'cell weekend';
  if (sat.getMonth() !== view.getMonth() && sun.getMonth() !== view.getMonth()) cell.classList.add('other');

  [['top', sat], ['bot', sun]].forEach(([pos, d]) => {
    const half = document.createElement('div');
    half.className = 'we-half ' + pos;
    if (iso(d) === todayIso) half.classList.add('we-today'); // 오늘이 주말이면 표시
    const wd = document.createElement('div');
    wd.className = 'wd';
    wd.textContent = (d.getMonth() !== view.getMonth())
      ? (d.getMonth()+1) + '/' + d.getDate()
      : d.getDate();
    half.appendChild(wd);

    // weekend holiday name (e.g. 부처님오신날 on a Sunday)
    // 코너(직전·다음 달 주말)에 오는 공휴일도 이름을 표시한다.
    const holColor = holidayName(d);   // 날짜 색은 토글과 무관하게 항상
    const holShow  = holidayShown(d);  // 이름 표시는 토글 반영
    if (holColor) {
      wd.classList.add('wd-holiday');  // 토요일이 공휴일이어도 파랑→빨강 유지
    }
    if (holShow) {
      const hn = document.createElement('div');
      hn.className = 'holiday-name';
      // 직전/다음 달 주말 공휴일 이름은 흐릿하게 (날짜와 통일)
      if (d.getMonth() !== view.getMonth()) hn.classList.add('other-hol');
      hn.textContent = holShow;
      half.appendChild(hn);
    }

    // Only single-day events that actually belong to this weekend day.
    // Multi-day events started on weekdays skip the weekend.
    // (개인일정 숨김이면 달력에서 제외)
    const di = iso(d);
    const dayEvents = events.filter(e => e.start === di && e.end === di
      && isVisibleType(e));
    if (dayEvents.length) {
      const wevs = document.createElement('div');
      wevs.className = 'wevs';
      // 직전/다음 달 주말(예: 달력 끝줄의 7/4·7/5)의 일정 내용도 흐릿하게
      if (d.getMonth() !== view.getMonth()) wevs.classList.add('other-ev');
      dayEvents.slice(0,3).forEach(e => {
        const row = document.createElement('div');
        row.className = 'we-ev';
        row.textContent = e.title;
        row.style.color = evTextColor(e);
        wevs.appendChild(row);
      });
      if (dayEvents.length > 3) {
        const more = document.createElement('div');
        more.className = 'we-more';
        more.textContent = '+' + (dayEvents.length - 3);
        wevs.appendChild(more);
      }
      half.appendChild(wevs);
    }
    half.addEventListener('click', (ev) => { ev.stopPropagation(); openDay(d); });
    cell.appendChild(half);
  });
  return cell;
}

function eventsOnDay(d) {
  const di = iso(d);
  return events.filter(e => di >= e.start && di <= e.end)
    .sort((a,b) => (a.start < b.start ? -1 : a.start > b.start ? 1 : 0));
}

function layoutEvents(week, weekDates, todayIso) {
  // Weekday columns 0..4 = weekDates 0..4. Weekend column (index 5) is excluded from bars.
  // Collect events overlapping this week's Mon..Fri range.
  const monIso = iso(weekDates[0]);
  const friIso = iso(weekDates[4]);

  // gather unique events touching Mon..Fri (개인일정 숨김이면 제외)
  const seen = {};
  const weekEvents = [];
  for (let i = 0; i < 5; i++) {
    eventsOnDay(weekDates[i]).forEach(e => {
      if (!isVisibleType(e)) return; // 개인/휴일일정 토글 반영
      if (!seen[e.id]) { seen[e.id] = true; weekEvents.push(e); }
    });
  }
  // sort: 종류 우선순위(휴일>중요>업무>개인) → 시작일 빠른 순 → 긴 순
  // 위 lane(0번)부터 채워지므로, 우선순위 높은 종류가 위로 올라간다.
  const TYPE_RANK = { holiday: 0, important: 1, work: 2, personal: 3 };
  weekEvents.sort((a,b) => {
    const ra = TYPE_RANK[a.type || 'work'] ?? 2;
    const rb = TYPE_RANK[b.type || 'work'] ?? 2;
    if (ra !== rb) return ra - rb;
    if (a.start !== b.start) return a.start < b.start ? -1 : 1;
    const la = (parse(a.end)-parse(a.start)), lb = (parse(b.end)-parse(b.start));
    return lb - la;
  });

  // How many event rows fit in a weekday cell without touching the date number.
  const gridEl = $('grid');
  let cellH = gridEl && gridEl.clientHeight ? gridEl.clientHeight / 5 : 0;
  if (!cellH) cellH = (window.innerHeight - 110) / 5; // fallback before first measure
  const LANE_H = 18, DATE_RESERVE = 22, BOTTOM_RESERVE = 13;
  let MAX_LANES = Math.floor((cellH - DATE_RESERVE - BOTTOM_RESERVE) / LANE_H);
  if (MAX_LANES < 1) MAX_LANES = 1;

  // Holiday names live in lane 0 of the cells they fall on. Pre-occupy lane 0
  // for those columns so events never share a row with a holiday name. Every
  // event (single or multi-day) then uses the SAME lane system, and its
  // vertical position is purely lane * LANE_H — no separate offset.
  const layer = document.createElement('div');
  layer.className = 'barlayer';

  // Holidays occupy lane 0 and are drawn as plain bars (no arrow/bg) so they
  // use the exact same font, padding and clipping rules as normal events.
  const lanes = []; // lanes[L] = array of [startCol,endCol] occupied
  lanes[0] = [];
  const LANE_H_HOL = 18;
  for (let i = 0; i < 5; i++) {
    const hol = holidayShown(weekDates[i]);
    if (!hol) continue;
    lanes[0].push([i, i]);
    const hb = document.createElement('div');
    hb.className = 'bar holiday-bar';
    // 직전/다음 달 날짜의 공휴일 이름은 흐릿하게 (날짜 숫자와 통일)
    if (weekDates[i].getMonth() !== view.getMonth()) hb.classList.add('other');
    hb.style.background = 'transparent';
    const totalU = 5 + 0.8, cW = 100 / totalU;
    hb.style.left = 'calc(' + (i * cW) + '% + 2px)';
    hb.style.width = 'calc(' + cW + '% - 4px)';
    hb.style.top = '0px';
    hb.innerHTML = '<span class="lbl"></span>';
    hb.querySelector('.lbl').textContent = hol;
    layer.appendChild(hb);
  }

  const overflowByCol = [0,0,0,0,0];

  weekEvents.forEach(e => {
    let startCol = -1, endCol = -1;
    for (let i = 0; i < 5; i++) {
      const di = iso(weekDates[i]);
      if (di >= e.start && di <= e.end) {
        if (startCol === -1) startCol = i;
        endCol = i;
      }
    }
    if (startCol === -1) return;

    const isMultiDay = e.start !== e.end;
    const arrowL = isMultiDay;
    const arrowR = isMultiDay;
    const contL = e.start < iso(weekDates[0]);
    const contR = e.end   > iso(weekDates[4]);

    // find the first lane with no column clash (lane 0 may be blocked by holidays)
    let lane = -1;
    for (let L = 0; L < MAX_LANES; L++) {
      const occ = lanes[L] || [];
      const clash = occ.some(([s,en]) => !(endCol < s || startCol > en));
      if (!clash) { lane = L; lanes[L] = occ.concat([[startCol,endCol]]); break; }
    }
    if (lane === -1) {
      for (let c = startCol; c <= endCol; c++) overflowByCol[c]++;
      return;
    }

    const bar = document.createElement('div');
    bar.className = 'bar' + (contL?' cont-l':'') + (contR?' cont-r':'');
    // 막대가 걸친 첫 칸이 직전/다음 달이면 흐릿하게 (날짜 숫자와 통일)
    if (weekDates[startCol].getMonth() !== view.getMonth()) bar.classList.add('other-ev');
    bar.style.background = evBgColor(e);
    bar.style.color = evTextColor(e);
    const totalUnits = 5 + 0.8;
    const colW = 100 / totalUnits;
    const leftPct = startCol * colW;
    const widthPct = (endCol - startCol + 1) * colW;
    bar.style.left = 'calc(' + leftPct + '% + 2px)';
    bar.style.width = 'calc(' + widthPct + '% - 4px)';
    bar.style.top = (lane * LANE_H) + 'px';

    let inner = '';
    if (arrowL) inner += '<span class="head l"></span><span class="line"></span>';
    inner += '<span class="lbl"></span>';
    if (arrowR) inner += '<span class="line"></span><span class="head r"></span>';
    bar.innerHTML = inner;
    bar.querySelector('.lbl').textContent = e.title;
    bar.addEventListener('click', (ev) => { ev.stopPropagation(); openEdit(e); });
    layer.appendChild(bar);
  });

  week.appendChild(layer);

  // "+N" overflow markers per column
  for (let i = 0; i < 5; i++) {
    if (overflowByCol[i] > 0) {
      const cell = week.querySelectorAll('.cell')[i];
      const more = document.createElement('div');
      more.className = 'more';
      more.style.position = 'absolute';
      more.style.bottom = '2px';
      more.textContent = '+' + overflowByCol[i];
      cell.appendChild(more);
    }
  }
}

/* ---- day sheet ---- */
function openDay(d) {
  lastSelectedDate = new Date(d);
  $('dayTitle').textContent = (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + KDOW[d.getDay()] + ')';
  const dow = d.getDay();
  const isWeekend = (dow === 0 || dow === 6);
  const di = iso(d);
  // Weekend: only single-day events that belong to this day.
  // Weekday: all events overlapping this day (incl. multi-day bars).
  const list = isWeekend
    ? events.filter(e => e.start === di && e.end === di)
        .sort((a,b) => (a.start < b.start ? -1 : a.start > b.start ? 1 : 0))
    : eventsOnDay(d);
  const wrap = $('dayList');
  wrap.innerHTML = '';
  if (list.length === 0) {
    wrap.innerHTML = '<div class="empty">일정이 없습니다</div>';
  } else {
    list.forEach(e => {
      const row = document.createElement('div');
      row.className = 'day-ev';
      const range = (e.start !== e.end) ? fmtRange(e) : '';
      row.innerHTML = '<div class="info"><div class="t"></div>'+
        (range?'<div class="sub range"></div>':'')+
        (e.memo?'<div class="sub memo"></div>':'')+'</div>';
      const titleEl = row.querySelector('.t');
      titleEl.textContent = e.title;
      const tcol = evTextColor(e);
      titleEl.style.color = tcol;
      if (range) { const r = row.querySelector('.range'); r.textContent = range; r.style.color = tcol; r.style.opacity = '0.7'; }
      if (e.memo) { const m = row.querySelector('.memo'); m.textContent = e.memo; m.style.color = tcol; m.style.opacity = '0.7'; }
      row.addEventListener('click', () => openEdit(e));
      wrap.appendChild(row);
    });
  }
  showSheet('daySheet');
}
function fmtRange(e) {
  const s = parse(e.start), en = parse(e.end);
  return (s.getMonth()+1)+'/'+s.getDate()+' – '+(en.getMonth()+1)+'/'+en.getDate();
}

// 주어진 날짜(시작일)가 속한 '달'에 표시되는 업무 일정들이 쓰는 배경색을 모아,
// 아직 안 쓰인 첫 색(c0..c8)을 돌려준다. 9색이 모두 쓰였으면 c0부터 순환한다.
// 걸친 일정(예: 6월말~7월초)은 두 달 모두에서 쓰인 것으로 계산된다.
function pickUnusedBg(startIsoStr) {
  const d = startIsoStr ? parse(startIsoStr) : new Date();
  const y = d.getFullYear(), m = d.getMonth();
  // 그 달의 시작/끝 경계
  const monthStart = iso(new Date(y, m, 1));
  const monthEnd = iso(new Date(y, m + 1, 0));
  // 그 달과 날짜 범위가 겹치는 업무 일정의 색 수집 (걸친 일정 = 양쪽 달 모두 포함)
  const used = new Set();
  events.forEach(ev => {
    if ((ev.type || 'work') !== 'work') return;          // 업무만 색을 씀
    if (ev.end < monthStart || ev.start > monthEnd) return; // 그 달과 안 겹치면 제외
    const bg = (typeof ev.bg === 'number') ? ev.bg : 0;
    used.add(bg);
  });
  // 편집 중인 일정 자신은 제외 (수정 케이스에선 호출 안 하지만 안전장치)
  for (let i = 0; i < PALETTE.length; i++) {
    if (!used.has(i)) return i;            // 안 쓰인 첫 색
  }
  // 9색이 다 쓰였으면 그 달의 업무 일정 개수 기준으로 순환
  const count = used.size; // 사실상 9
  return count % PALETTE.length; // = 0 (c0부터 다시)
}

/* ---- edit sheet ---- */
function openEdit(e, fromSearch) {
  closeSheet('daySheet');
  cameFromSearch = !!fromSearch;
  // 검색을 거쳐 들어온 경우에만 헤더에 '검색' 뒤로 버튼을 보여준다
  document.querySelector('.edit-head').classList.toggle('from-search', cameFromSearch);
  if (e) {
    editingId = e.id;
    $('editTitle').textContent = '일정 수정';
    $('fTitle').value = e.title;
    $('fStart').value = e.start;
    $('fEnd').value = e.end;
    $('fMemo').value = e.memo || '';
    selectedType = e.type || 'work';
    selectedBg = (typeof e.bg === 'number') ? e.bg : 0;
    $('deleteRow').style.display = 'flex';
  } else {
    editingId = null;
    $('editTitle').textContent = '새 일정';
    const base = lastSelectedDate ? iso(lastSelectedDate) : iso(new Date());
    $('fTitle').value = '';
    $('fStart').value = base;
    $('fEnd').value = base;
    $('fMemo').value = '';
    selectedType = 'work';
    selectedBg = pickUnusedBg(base); // 그 달에 안 쓰인 색을 기본값으로
    $('deleteRow').style.display = 'none';
  }
  document.querySelectorAll('#types .type-chip').forEach(c => {
    c.classList.toggle('sel', c.dataset.t === selectedType);
  });
  document.querySelectorAll('#colors .sw').forEach(sw => {
    sw.classList.toggle('sel', +sw.dataset.c === selectedBg);
  });
  syncWeekendRule();
  setTimeout(() => showSheet('editSheet'), 180);
}

// Disable background-color picker only for non-work types
// (업무는 하루/여러날 모두 배경색 적용 가능)
function syncColorsEnabled() {
  const nonWork = (selectedType && selectedType !== 'work');
  $('colors').classList.toggle('disabled', nonWork);
  $('colorsHint').classList.toggle('show', nonWork);
  $('colorsHint').textContent = '이 종류는 배경색이 자동으로 정해집니다';
}

// 시작일이 주말(토/일)이면 '업무' 종류를 막고, 업무였다면 '중요일정'으로 자동 전환
function isWeekendDate(isoStr) {
  if (!isoStr) return false;
  const dow = parse(isoStr).getDay();
  return dow === 0 || dow === 6;
}
function syncWeekendRule() {
  const weekend = isWeekendDate($('fStart').value);
  const workChip = document.querySelector('#types .type-chip[data-t=work]');
  if (weekend) {
    // 업무가 선택돼 있었으면 중요일정으로 자동 변경
    if (selectedType === 'work') {
      selectedType = 'important';
      document.querySelectorAll('#types .type-chip').forEach(c =>
        c.classList.toggle('sel', c.dataset.t === selectedType));
    }
    if (workChip) workChip.classList.add('chip-disabled');
    $('weekendHint').classList.add('show');
  } else {
    if (workChip) workChip.classList.remove('chip-disabled');
    $('weekendHint').classList.remove('show');
  }
  syncColorsEnabled();
}

function saveEvent() {
  const title = $('fTitle').value.trim();
  if (!title) { $('fTitle').focus(); return; }
  let start = $('fStart').value, end = $('fEnd').value;
  if (!start) start = iso(new Date());
  if (!end || end < start) end = start;
  const data = {
    title, start, end,
    memo: $('fMemo').value.trim(),
    type: selectedType,
    bg: selectedBg
  };
  let isEdit = false;
  if (editingId) {
    const idx = events.findIndex(x => x.id === editingId);
    if (idx >= 0) events[idx] = { ...events[idx], ...data };
    isEdit = true;
  } else {
    events.push({ id: uid(), ...data });
  }
  save();
  closeSheet('editSheet');
  render();
  showToast(isEdit ? '일정 변경 완료되었습니다' : '일정 추가 완료되었습니다');
}

function deleteEvent() {
  if (!editingId) return;
  events = events.filter(x => x.id !== editingId);
  save();
  closeSheet('editSheet');
  render();
  showToast('일정 삭제 완료되었습니다');
}

// html+body 동시에 잠금/해제 (키보드가 올라와도 뒤 달력이 안 밀리게)
function lockBack() {
  document.documentElement.classList.add('sheet-open');
  document.body.classList.add('sheet-open');
}
function unlockBack() {
  document.documentElement.classList.remove('sheet-open');
  document.body.classList.remove('sheet-open');
}
function showSheet(id) {
  $('scrim').classList.add('open'); $(id).classList.add('open');
  lockBack();
}
function closeSheet(id) {
  $(id).classList.remove('open');
  const anyOpen = document.querySelectorAll('.sheet.open').length;
  if (!anyOpen) { $('scrim').classList.remove('open'); unlockBack(); }
}
function closeAll() {
  document.querySelectorAll('.sheet.open').forEach(s => s.classList.remove('open'));
  $('scrim').classList.remove('open');
  unlockBack();
  cameFromSearch = false;
  if (_navActive) { _navActive = false; history.back(); }
}

/* ---- year/month picker ---- */
function openPicker() {
  const yearCol = $('yearCol');
  const monthCol = $('monthCol');
  yearCol.innerHTML = '';
  monthCol.innerHTML = '';
  const curY = view.getFullYear();
  const curM = view.getMonth();
  for (let y = curY - 5; y <= curY + 5; y++) {
    const o = document.createElement('div');
    o.className = 'opt' + (y === curY ? ' sel' : '');
    o.textContent = y + '년';
    o.onclick = () => {
      view.setFullYear(y); render();
      [...yearCol.children].forEach(c => c.classList.toggle('sel', c === o));
    };
    yearCol.appendChild(o);
  }
  for (let m = 0; m < 12; m++) {
    const o = document.createElement('div');
    o.className = 'opt' + (m === curM ? ' sel' : '');
    o.textContent = (m+1) + '월';
    o.onclick = () => {
      view.setDate(1); view.setMonth(m); render();
      [...monthCol.children].forEach(c => c.classList.toggle('sel', c === o));
    };
    monthCol.appendChild(o);
  }
  $('pickerScrim').classList.add('open');
  $('picker').classList.add('open');
  lockBack();
  // center current selections
  setTimeout(() => {
    const sy = yearCol.querySelector('.sel'); if (sy) sy.scrollIntoView({block:'center'});
    const sm = monthCol.querySelector('.sel'); if (sm) sm.scrollIntoView({block:'center'});
  }, 30);
}
function closePicker() {
  $('picker').classList.remove('open');
  $('pickerScrim').classList.remove('open');
  unlockBack();
}

// Keep the edit sheet above the on-screen keyboard.
(function () {
  const vv = window.visualViewport;
  if (!vv) return;
  let lastKb = -1;
  let scrolledFor = null; // 이번 포커스에서 이미 끌어올렸는지 (중복 스크롤 방지)
  const setKb = () => {
    const kb = Math.round(Math.max(0, window.innerHeight - vv.height - vv.offsetTop));
    // 1~2px 미세 변동은 무시해서 시트가 출렁이지 않게 한다
    if (Math.abs(kb - lastKb) < 4) return false;
    lastKb = kb;
    document.documentElement.style.setProperty('--kb', kb + 'px');
    return true;
  };
  // resize(키보드 등장/사라짐)에서만 필요 시 한 번 끌어올린다
  vv.addEventListener('resize', () => {
    const changed = setKb();
    const kb = lastKb;
    const el = document.activeElement;
    if (kb > 0 && el && el.getBoundingClientRect && el.scrollIntoView) {
      const r = el.getBoundingClientRect();
      if (r.bottom > vv.height - 8 && scrolledFor !== el) {
        scrolledFor = el;
        el.scrollIntoView({ block: 'center' }); // smooth 제거: 즉시 이동(반복 떨림 방지)
      }
    }
    if (kb === 0) scrolledFor = null; // 키보드 내려가면 초기화
  });
  // scroll 이벤트에서는 값 갱신도 스크롤도 하지 않는다 (떨림의 주원인이라 무시)
})();

// 어떤 입력칸이든 포커스가 들어오면 뒤 달력을 잠그고, 빠지면 (열린 시트가
// 없을 때) 풀어준다. 이렇게 전역으로 한 번만 걸어두면 앞으로 어떤 입력칸을
// 새로 추가해도 자동으로 뒤가 잠긴다 — 매번 따로 처리할 필요가 없다.
(function () {
  const isField = el => el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable);
  document.addEventListener('focusin', (e) => {
    if (isField(e.target)) lockBack();
  });
  document.addEventListener('focusout', () => {
    // 포커스가 다른 입력칸으로 옮겨가는 중일 수 있으니 한 박자 뒤에 확인
    setTimeout(() => {
      const stillField = isField(document.activeElement);
      const anySheet = document.querySelectorAll('.sheet.open, .picker.open').length;
      if (!stillField && !anySheet) unlockBack();
    }, 60);
  });
})();

// [터치 스크롤 가드] 시트 안에서 손가락으로 스크롤할 때, 시트가 이미 맨 위/맨
// 아래에 닿았는데도 더 끌면 그 움직임이 뒤 달력으로 새어나가(스크롤 체이닝)
// 화면이 떨린다. 끝에 닿은 상태에서의 '바깥 방향' 드래그만 막아 뒤로 전달되지
// 않게 한다. (특히 안드로이드 크롬에서 CSS overscroll-behavior만으론 부족함)
// 또한 메모(textarea)처럼 '시트 안에서 자체 스크롤되는 영역'을 만지면 그쪽
// 스크롤을 우선하고, 그 영역이 끝에 닿았을 때만 동작을 막는다.
(function () {
  let startY = 0;
  let target = null;     // 시트/피커
  let inner = null;      // 시트 안에서 자체 스크롤되는 영역(textarea 등)
  // 세로로 스크롤 가능한 요소인지 (textarea + overflow 걸린 영역: 피커 목록 등)
  function scrollableEl(el) {
    while (el && el !== document.body) {
      if (el.tagName === 'TEXTAREA' && el.scrollHeight > el.clientHeight) return el;
      // 피커의 년/월 목록(.picker-col)처럼 overflow-y로 자체 스크롤되는 영역
      if (el.classList && el.classList.contains('picker-col') && el.scrollHeight > el.clientHeight) return el;
      el = el.parentElement;
    }
    return null;
  }
  document.addEventListener('touchstart', (e) => {
    target = e.target.closest('.sheet, .picker');
    inner = scrollableEl(e.target);
    startY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!target) {
      // 시트 바깥(달력 등)을 만지는 경우: 시트가 열려 있으면 뒤 스크롤 자체를 막음
      if (document.querySelector('.sheet.open, .picker.open')) e.preventDefault();
      return;
    }
    const y = e.touches[0].clientY;
    const dy = y - startY; // 아래로 끌면 +, 위로 끌면 -

    // 1) 메모(textarea) 등 내부 스크롤 영역을 만지는 중이면 그쪽 스크롤을 우선한다.
    //    그 영역이 끝에 닿은 채로 더(바깥 방향) 끌 때만 막아서, 시트/뒤로 안 샌다.
    if (inner) {
      const iTop = inner.scrollTop <= 0;
      const iBottom = inner.scrollTop + inner.clientHeight >= inner.scrollHeight - 1;
      if ((iTop && dy > 0) || (iBottom && dy < 0)) {
        e.preventDefault(); // 내부 영역 끝 → 시트로 전달 차단
      }
      return; // 내부 영역 안에서는 브라우저 기본 스크롤에 맡긴다
    }

    // 2) 그 외(시트 본문) — 시트가 끝에 닿은 채 바깥 방향으로 끌면 막는다
    const atTop = target.scrollTop <= 0;
    const atBottom = target.scrollTop + target.clientHeight >= target.scrollHeight - 1;
    const scrollable = target.scrollHeight > target.clientHeight;
    if (!scrollable || (atTop && dy > 0) || (atBottom && dy < 0)) {
      e.preventDefault();
    }
  }, { passive: false });
})();

/* ===== 달력 위아래 제스처로 달 넘기기 (3.05) =====
   - 폰: 그리드를 세로로 스와이프 (위로 밀면 다음 달, 아래로 끌면 이전 달)
   - PC: 그리드 위에서 마우스 휠
   - 시트/피커가 열려 있을 때는 동작하지 않는다(기존 닫기 드래그와 충돌 방지).
   - 실수 방지: 일정 거리(SWIPE_MIN) 이상, 가로보다 세로로 더 많이 끌었을 때만. */
(function () {
  const SWIPE_MIN = 60;     // 이 거리(px) 이상 끌어야 달이 넘어감
  const WHEEL_MIN = 30;     // 휠 누적 임계치
  const gridEl = document.getElementById('grid');
  if (!gridEl) return;

  // 공용 달 이동: delta = +1(다음 달) / -1(이전 달)
  function goMonth(delta) {
    view.setDate(1);
    view.setMonth(view.getMonth() + delta);
    render();
    // 방향에 맞는 슬라이드 애니메이션을 새로 그려진 그리드에 입힌다.
    // (연속 호출에도 매번 재생되도록 클래스 제거→reflow→추가)
    const g = document.getElementById('grid');
    if (g) {
      const cls = delta > 0 ? 'slide-up' : 'slide-down';
      g.classList.remove('slide-up', 'slide-down');
      void g.offsetWidth;            // reflow 강제 — 애니메이션 재시작용
      g.classList.add(cls);
      g.addEventListener('animationend', () => g.classList.remove(cls), { once: true });
    }
  }

  // 시트나 피커가 열려 있으면 제스처 비활성
  function blocked() {
    return !!document.querySelector('.sheet.open, .picker.open');
  }

  /* --- 터치 스와이프 --- */
  let sx = 0, sy = 0, tracking = false;
  gridEl.addEventListener('touchstart', (e) => {
    if (blocked()) { tracking = false; return; }
    tracking = true;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, { passive: true });

  gridEl.addEventListener('touchend', (e) => {
    if (!tracking || blocked()) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx;
    const dy = t.clientY - sy;
    // 세로로 충분히, 그리고 가로보다 세로로 더 많이 움직였을 때만
    if (Math.abs(dy) < SWIPE_MIN || Math.abs(dy) <= Math.abs(dx)) return;
    goMonth(dy < 0 ? 1 : -1);   // 위로 밀면(dy<0) 다음 달
  }, { passive: true });

  /* --- 마우스 휠 (PC) --- */
  let wheelAcc = 0, wheelTimer = null;
  gridEl.addEventListener('wheel', (e) => {
    if (blocked()) return;
    e.preventDefault();              // 페이지 스크롤 대신 달 넘기기
    wheelAcc += e.deltaY;
    if (Math.abs(wheelAcc) >= WHEEL_MIN) {
      goMonth(wheelAcc > 0 ? 1 : -1); // 휠 아래로(+) = 다음 달
      wheelAcc = 0;
    }
    clearTimeout(wheelTimer);
    wheelTimer = setTimeout(() => { wheelAcc = 0; }, 200);
  }, { passive: false });
})();


// Voice input via Web Speech API (mic buttons on 제목/메모)
(function () {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micButtons = document.querySelectorAll('.mic-btn');
  if (!SR) { micButtons.forEach(b => b.style.display = 'none'); return; }

  let rec = null, activeBtn = null, baseText = '';

  function stop() { if (rec) { try { rec.stop(); } catch(e){} } }
  function startFor(btn) {
    const field = document.getElementById(btn.dataset.target);
    if (!field) return;
    rec = new SR();
    rec.lang = 'ko-KR';
    rec.interimResults = true;
    rec.continuous = false;
    activeBtn = btn;
    baseText = field.value ? field.value.trim() + ' ' : '';
    rec.onresult = (ev) => {
      let txt = '';
      for (let i = 0; i < ev.results.length; i++) txt += ev.results[i][0].transcript;
      field.value = baseText + txt;
    };
    rec.onerror = (ev) => { showToast(micErrorText(ev && ev.error)); endUI(); };
    rec.onend = () => endUI();
    btn.classList.add('listening');
    try { rec.start(); } catch(e) { endUI(); }
  }
  function endUI() {
    if (activeBtn) activeBtn.classList.remove('listening');
    activeBtn = null; rec = null;
  }
  function micErrorText(code) {
    if (code === 'not-allowed' || code === 'service-not-allowed')
      return '마이크 권한이 없습니다. 파일을 직접 연 경우(file://) 음성입력이 막힙니다.';
    if (code === 'no-speech') return '음성이 감지되지 않았습니다.';
    if (code === 'network') return '네트워크 연결이 필요합니다.';
    if (code === 'audio-capture') return '마이크를 찾을 수 없습니다.';
    return '음성 입력을 사용할 수 없는 환경입니다.';
  }
  micButtons.forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      if (activeBtn === btn) { stop(); return; }
      if (rec) stop();
      startFor(btn);
    });
  });
})();

// escape text for safe HTML, then wrap matched parts with a highlight span
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
  ));
}
function highlight(text, q) {
  const safe = escapeHtml(text);
  if (!q) return safe;
  const lc = text.toLowerCase(), lq = q.toLowerCase();
  let out = '', from = 0, idx;
  while ((idx = lc.indexOf(lq, from)) !== -1) {
    out += escapeHtml(text.slice(from, idx));
    out += '<span class="sr-hl">' + escapeHtml(text.slice(idx, idx + q.length)) + '</span>';
    from = idx + q.length;
  }
  out += escapeHtml(text.slice(from));
  return out;
}
function runSearch() {
  const q = $('searchInput').value.trim();
  if (!q) { $('searchInput').focus(); return; }
  // 키보드를 먼저 내린다
  $('searchInput').blur();
  // 키보드가 내려가는 동안(뷰포트가 다시 커지는 동안) 잠깐 기다렸다가 결과 시트를 올린다
  setTimeout(() => showSearchResults(q), 220);
}
function showSearchResults(q) {
  lastSearchQuery = q; // 뒤로가기로 이 목록을 다시 열 수 있게 기억
  const lq = q.toLowerCase();
  const hits = events
    .filter(e =>
      (e.title || '').toLowerCase().includes(lq) ||
      (e.memo  || '').toLowerCase().includes(lq))
    .sort((a, b) => (a.start < b.start ? 1 : a.start > b.start ? -1 : 0)); // 최신 시작일 먼저

  $('searchTitle').textContent = '검색 결과 · ' + hits.length + '개';
  const wrap = $('searchList');
  wrap.innerHTML = '';
  if (hits.length === 0) {
    wrap.innerHTML = '<div class="empty">"' + escapeHtml(q) + '"에 해당하는 일정이 없습니다</div>';
  } else {
    hits.forEach(e => {
      const item = document.createElement('div');
      item.className = 'sr-item';
      const dateStr = (e.start === e.end) ? e.start : (e.start + ' ~ ' + e.end);
      let html = '';
      html += '<div class="sr-line"><span class="k">날짜: </span><span class="sr-date">' + escapeHtml(dateStr) + '</span></div>';
      html += '<div class="sr-title" style="color:' + evTextColor(e) + '">' + highlight(e.title || '', q) + '</div>';
      if (e.memo) {
        html += '<div class="sr-line"><span class="k">내용:</span></div>';
        html += '<div class="sr-memo">' + highlight(e.memo, q) + '</div>';
      }
      item.innerHTML = html;
      item.addEventListener('click', () => { closeSheet('searchSheet'); openEdit(e, true); });
      wrap.appendChild(item);
    });
  }
  showSheet('searchSheet');
  // 폰 뒤로가기로 이 목록을 닫을 수 있도록 history에 표시
  pushNav();
}

     앱 시작 → (스플래시) → 로그인 상태 확인

// 클라우드에서 새 데이터가 도착하면 화면/로컬을 갱신 (되쏘지 않음 — 메아리 방지)

// 스플래시 숨김 — 앱 시작 후 최소 표시 시간(SPLASH_MIN_MS)을 보장한 뒤
// 부드럽게 사라지게 한다. 로딩이 더 빨라도 로고가 깜빡이지 않도록.
const SPLASH_MIN_MS = 800;
const _splashStart = Date.now();
let _splashHidden = false;
function hideSplash() {
  if (_splashHidden) return;
  _splashHidden = true;
  const elapsed = Date.now() - _splashStart;
  const wait = Math.max(0, SPLASH_MIN_MS - elapsed);
  setTimeout(() => { $('authSplash').classList.add('hide'); }, wait);
}

/* ===== 인앱 브라우저(카톡·인스타·페북 등) 감지 + 브라우저로 열기 =====
   인앱 브라우저에서는 구글 로그인이 막히므로, 감지되면 안내 박스를 띄우고
   진짜 브라우저(크롬)로 빠져나갈 수단을 준다.
   - 안드로이드: intent:// 스킴으로 크롬을 직접 띄움(대부분 성공)
   - 그 외/실패: '주소 복사' 후 사용자가 브라우저에 붙여넣게 안내 */
(function () {
  const ua = (navigator.userAgent || '').toLowerCase();
  // 대표적인 인앱 브라우저 신호들
  const inApp = /kakaotalk|instagram|fban|fbav|fb_iab|line\/|naver|daum|band|everytimeapp|whale|snapchat|wechat|micromessenger/.test(ua);
  const isAndroid = /android/.test(ua);

  if (!inApp) return;  // 일반 브라우저면 아무것도 안 함

  const notice = $('inappNotice');
  if (notice) notice.classList.add('show');

  // 현재 주소
  const url = location.href;

  // 안드로이드: intent로 크롬 강제 실행
  function openInChrome() {
    if (isAndroid) {
      // https:// 를 떼고 intent 스킴으로 — 크롬에서 열도록 지정
      const noScheme = url.replace(/^https?:\/\//, '');
      location.href = 'intent://' + noScheme +
        '#Intent;scheme=https;package=com.android.chrome;end';
    } else {
      // 아이폰 등은 강제 실행이 막혀 있어 주소 복사로 유도
      copyUrl();
      showToast('주소가 복사됐어요. Safari·크롬 주소창에 붙여넣어 주세요.');
    }
  }

  function copyUrl() {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(
        () => showToast('주소가 복사됐어요. 브라우저에 붙여넣어 주세요.'),
        () => fallbackCopy()
      );
    } else {
      fallbackCopy();
    }
  }
  function fallbackCopy() {
    try {
      const ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
      showToast('주소가 복사됐어요. 브라우저에 붙여넣어 주세요.');
    } catch(e) {
      showToast('주소 복사가 안 돼요. 메뉴(⋮)에서 "다른 브라우저로 열기"를 눌러 주세요.');
    }
  }

  if ($('openBrowserBtn')) $('openBrowserBtn').onclick = openInChrome;
  if ($('copyUrlBtn')) $('copyUrlBtn').onclick = copyUrl;
})();

/* ---- 폰 뒤로가기(하드웨어/제스처) 지원 ----
   검색 목록을 history에 한 단계 쌓는다. 검색 목록에서 항목을 눌러 수정
   화면으로 가면 그 표시는 그대로 유지되므로, 폰 뒤로가기 한 번이
   상황에 따라 (수정→목록 복귀) 또는 (목록→닫힘)으로 동작한다. */
function pushNav() {
  if (_navActive) return;   // 이미 쌓여 있으면 중복으로 더 쌓지 않음
  _navActive = true;
  history.pushState({ cal: 1 }, '');
}
window.addEventListener('popstate', () => {
  if (!_navActive) return;
  _navActive = false;
  // 검색을 거쳐 들어온 수정 화면이 열려 있으면 → 검색 목록으로 복귀
  if ($('editSheet').classList.contains('open') && cameFromSearch) {
    cameFromSearch = false;
    closeSheet('editSheet');
    if (lastSearchQuery) setTimeout(() => showSearchResults(lastSearchQuery), 60);
    return;
  }
  // 검색 목록이 열려 있으면 → 닫기
  if ($('searchSheet').classList.contains('open')) {
    closeSheet('searchSheet');
  }
});
// re-render on rotation / window resize so font size & lane count match new cell width
let _rzTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_rzTimer);
  _rzTimer = setTimeout(render, 150);
});
window.addEventListener('orientationchange', () => setTimeout(render, 200));
</script>
</body>
</html>
